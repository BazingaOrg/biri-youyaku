# SPA fallback：前端是 wouter 单页路由，/jobs/:id 这种深链直接刷新时
# 文件系统里并没有对应文件，默认 nginx 会 404。这里全部回退到 index.html，
# 由前端路由器接管。
#
# 这份 conf 替换 nginx 默认的 default.conf；只描述站点 server 块，
# 顶层 events / http 块仍由基础镜像提供。

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 静态资源走文件系统；命中不到的请求 fallback 到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 带 hash 的构建产物可以长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 防止 index.html 被 CDN / 浏览器缓存住老的入口
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
