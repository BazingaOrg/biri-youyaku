name: Bug report
description: 报告一个能稳定复现的 bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢报 bug。请尽量贴全下列信息，能大幅缩短排查时间。
        **不要**把 `LLM_API_KEY` / `BILI_SESSDATA` / `API_TOKEN` 贴进来。

  - type: input
    id: version
    attributes:
      label: 后端版本
      description: 跑 `curl http://127.0.0.1:17821/v1/version` 的输出
      placeholder: '{"version": "0.1.0"}'
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统 / 部署方式
      placeholder: macOS 14.5 (M2) / Ubuntu 22.04 / Docker compose / ...
    validations:
      required: true

  - type: input
    id: llm
    attributes:
      label: LLM 配置
      description: 只填 base_url 和 model；**不要**贴 key
      placeholder: "https://api.openai.com/v1, gpt-4o-mini"

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 http://127.0.0.1:5173
        2. 粘贴 https://www.bilibili.com/video/BVxxxxxxxxxx
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期 vs 实际
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 后端日志（最后 50 行）
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: 其他线索
