name: Feature request
description: 提一个想加的功能或改进
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题
      placeholder: "现在 X，导致我 Y..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你的方案
      placeholder: "希望加 Z..."

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / 已尝试

  - type: textarea
    id: context
    attributes:
      label: 额外背景
