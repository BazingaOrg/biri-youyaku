name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: server (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install deps (no ASR extras — too heavy for CI)
        run: uv sync --extra dev

      # 不强制 `ruff format --check`：现有代码并非由某个 ruff 版本统一 format 过，
      # 跨版本 format 规则一变就会把大批没动过的文件判成需重排，CI 平白挂红。
      # 只跑 `ruff check`（真 lint，抓未用导入 / import 顺序等实际问题）。
      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        env:
          LLM_API_KEY: dummy-for-tests
        run: uv run pytest -q

  web:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - run: npm ci --no-audit --no-fund

      # 暂未配 ESLint：类型检查由 `npm run build` 里的 `tsc` 兜底。
      # 真要补：往 devDependencies 加 eslint / @typescript-eslint，package.json
      # scripts 加 `"lint": "eslint . --ext .ts,.tsx"`，这里再加一个 lint step。
      - name: Typecheck + build
        env:
          VITE_API_BASE_URL: http://localhost:17821
          VITE_API_TOKEN: ""
        run: npm run build

  docker:
    name: docker build (smoke)
    runs-on: ubuntu-latest
    needs: [server, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false
          load: true
          tags: biri-youyaku-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
          load: true
          tags: biri-youyaku-web:ci
          build-args: |
            VITE_API_BASE_URL=http://localhost:17821
            VITE_API_TOKEN=
          cache-from: type=gha
          cache-to: type=gha,mode=max
