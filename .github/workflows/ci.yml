name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: server (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install deps (no ASR extras — too heavy for CI)
        run: uv sync --extra dev

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        env:
          LLM_API_KEY: dummy-for-tests
        run: uv run pytest -q

  web:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - run: npm ci --no-audit --no-fund

      # 注：暂未在 web/package.json 配 lint script。想要的话：
      #   1) 把 eslint / @typescript-eslint 加进 devDependencies
      #   2) 在 package.json scripts 里加 "lint": "eslint . --ext .ts,.tsx"
      #   3) 在这里加一个 `- run: npm run lint` step
      # 类型检查由下面 `npm run build` 里的 `tsc` 兜底。

      - name: Typecheck + build
        env:
          VITE_API_BASE_URL: http://localhost:17821
          VITE_API_TOKEN: ""
        run: npm run build

  docker:
    name: docker build (smoke)
    runs-on: ubuntu-latest
    needs: [server, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false
          load: true
          tags: biri-youyaku-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
          load: true
          tags: biri-youyaku-web:ci
          build-args: |
            VITE_API_BASE_URL=http://localhost:17821
            VITE_API_TOKEN=
          cache-from: type=gha
          cache-to: type=gha,mode=max
